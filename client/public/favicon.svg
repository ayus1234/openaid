<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="url(#shine)"/>

  <!-- Shield shape -->
  <path d="M32 10 L50 18 L50 34 C50 44 32 54 32 54 C32 54 14 44 14 34 L14 18 Z"
        fill="white" opacity="0.15"/>
  <path d="M32 13 L48 20 L48 34 C48 43 32 52 32 52 C32 52 16 43 16 34 L16 20 Z"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Letter "O" for OpenAid -->
  <text x="32" y="38" text-anchor="middle" font-family="Arial, sans-serif"
        font-weight="900" font-size="22" fill="white" letter-spacing="-1">OA</text>

  <!-- Small tricolor dots at bottom -->
  <circle cx="26" cy="48" r="2" fill="#FF9933" opacity="0.9"/>
  <circle cx="32" cy="48" r="2" fill="white" opacity="0.9"/>
  <circle cx="38" cy="48" r="2" fill="#138808" opacity="0.9"/>
</svg>
